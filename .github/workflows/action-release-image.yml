name: Action Release Image

# Build the operator release image and push it to the GitHub Container Registry
# for the arenadata project (ghcr.io/arenadata/starrocks-kubernetes-operator).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # ghcr.io/<owner>/<repo> => ghcr.io/arenadata/starrocks-kubernetes-operator
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    name: build and push operator image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # On a v* tag: produces {version}, {major}.{minor}, and (latest=auto) latest.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LDFLAGS=-s -w -X main.VERSION=${{ steps.meta.outputs.version }} -X main.COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
